<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HelloAI-theme-2 Header Preview</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../../../common/vendors/bootstrap/bootstrap.min.css">
  <link rel="stylesheet" href="../../../common/vendors/fontawesome/css/all.min.css">
  <link rel="stylesheet" href="../../../common/css/base.css">
</head>
<body>
  <div class="EasyDNNTheme_HelloAI-theme-2">
    <header class="eds_siteHeader is-sticky-ready">
      <div class="container-fluid eds_headerContainer">
        <div class="eds_siteHeaderInner">
          <div class="eds_headerZone eds_headerLogoZone">
            <a class="eds_logoLink" href="#" aria-label="Quote Nine home">
              <img class="eds_logoImage" src="../../../common/images/logo.png" alt="Quote Nine Car Magazine">
            </a>
          </div>

          <div class="eds_headerZone eds_headerNavZone">
            <nav class="raMenuWrapper edsmm_mainMenu" aria-label="Primary">
              <ul class="edsmm_mainLevel">
                <li class="is-active"><a class="edsmm_itemContainer" href="#">Home</a></li>
                <li><a class="edsmm_itemContainer" href="#">News</a></li>
                <li><a class="edsmm_itemContainer" href="#">Electric</a></li>
                <li><a class="edsmm_itemContainer" href="#">Features</a></li>
                <li><a class="edsmm_itemContainer" href="#">Stories</a></li>
                <li><a class="edsmm_itemContainer" href="#">About us</a></li>
              </ul>
            </nav>
          </div>

          <div class="eds_headerZone eds_headerActionsZone">
            <a class="eds_contactButton" href="#">Contact</a>
            <div class="eds_headerActionIcons">
              <a class="eds_headerActionIcon" href="#" aria-label="Flag"><i class="fa-solid fa-flag"></i></a>
              <a class="eds_headerActionIcon" href="#" aria-label="Share"><i class="fa-solid fa-share-nodes"></i></a>
              <a class="eds_headerActionIcon" href="#" aria-label="Search"><i class="fa-solid fa-magnifying-glass"></i></a>
              <a class="eds_headerActionIcon is-active" href="#" aria-label="Profile"><i class="fa-solid fa-user"></i></a>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="eds_main">
      <div class="container py-5">
        <section class="eds_shellPlaceholder">
          <h1>Desktop Header Preview</h1>
          <p>Desktop-first shell header only. Mobile variants and content blocks are intentionally left for later tasks.</p>
        </section>
      </div>
    </main>
  </div>

  <script src="../../../common/vendors/bootstrap/bootstrap.bundle.min.js"></script>
  <script src="../../../common/js/navigation.js"></script>
  <script src="../../../common/js/theme.js"></script>
</body>
</html>
